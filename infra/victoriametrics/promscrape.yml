global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: victoriametrics
    static_configs:
      - targets: ["victoriametrics:8428"]

  - job_name: victorialogs
    static_configs:
      - targets: ["victorialogs:9428"]

  - job_name: litellm
    metrics_path: /metrics/
    static_configs:
      - targets: ["litellm:4000"]

  - job_name: codex-rag-demo
    metrics_path: /metrics
    static_configs:
      - targets: ["codex-rag-demo:8080"]

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: vector
    static_configs:
      - targets: ["vector:9598"]
