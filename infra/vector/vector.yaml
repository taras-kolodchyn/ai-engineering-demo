api:
  enabled: true
  address: 0.0.0.0:8686

sources:
  docker_logs:
    type: docker_logs
    auto_partial_merge: true
    docker_host: unix:///var/run/docker.sock

  internal_metrics:
    type: internal_metrics

transforms:
  normalize_docker_logs:
    type: remap
    inputs:
      - docker_logs
    source: |
      .project = to_string(.label."com.docker.compose.project") ?? "ai-engineering-demo"
      .service = to_string(.label."com.docker.compose.service") ?? to_string(.container_name) ?? "unknown"
      .container = to_string(.container_name) ?? "unknown"
      .image = to_string(.image) ?? "unknown"
      .stream = to_string(.stream) ?? "stdout"
      .component = to_string(.label."com.ai-demo.component") ?? "unknown"
      .stack = to_string(.label."com.ai-demo.stack") ?? "ai-engineering-demo"

sinks:
  victorialogs:
    type: http
    inputs:
      - normalize_docker_logs
    uri: http://victorialogs:9428/insert/jsonline?_stream_fields=project,service,container,component,stream&_msg_field=message&_time_field=timestamp&ignore_fields=label.com.docker.compose.config-hash,label.com.docker.compose.project.config_files,label.com.docker.compose.project.working_dir
    compression: gzip
    encoding:
      codec: json
    framing:
      method: newline_delimited
    healthcheck:
      enabled: false

  prometheus_metrics:
    type: prometheus_exporter
    inputs:
      - internal_metrics
    address: 0.0.0.0:9598
